<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nahidul Islam Shahin</title>
<link rel="icon" sizes="180x180" type="image/png" href="favicon.png">
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: #add8e6; /* lightblue */
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
    }

    h1 {
        text-decoration: underline;
        color: #1d3557;
        margin-bottom: 30px;
        text-align: center;
    }

    table {
        width: 100%;
        max-width: 400px;
        border-collapse: collapse;
        box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        border-radius: 10px;
        overflow: hidden;
        margin-bottom: 20px;
        background: white;
    }

    th, td {
        padding: 12px;
        text-align: center;
    }

    tr:nth-child(odd) { background-color: #f9f9f9; }
    tr:nth-child(even) { background-color: #eaf9ea; }

    tr.header { background-color: #2a9d8f; color: white; font-weight: bold; }
    tr.total { background-color: orange; color: white; font-weight: bold; }

    a {
        text-decoration: none;
        color: #264653;
        font-size: 1.1rem;
        font-weight: bold;
        transition: color 0.3s;
    }

    a:hover {
        color: #e63946;
    }

    @media (max-width: 480px) {
        table, th, td {
            font-size: 0.9rem;
        }

        h1 {
            font-size: 1.8rem;
        }
    }
</style>
</head>
<body>
<h1>Nahidul Islam Shahin</h1>

<table>
    <tr class="header">
        <td>Activities</td>
        <td>Hadiya</td>
    </tr>
    <tr><td>Tyles Work</td><td>100</td></tr>
    <tr><td>Orosh Sharif'25</td><td>100</td></tr>
    <tr class="total"><td>Total</td><td>200</td></tr>
</table>

<h3><a href="index.html">Back to Main Page</a></h3>
</body>
</html>
