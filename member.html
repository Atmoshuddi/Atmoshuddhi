<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>সদস্যবৃন্দ</title>
    <link rel="icon" sizes="180x180" type="image/png" href="favicon.png">
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to bottom right, #dcedc1, #a8e6cf);
            color: #333;
        }

        .container {
            max-width: 1000px;
            margin: 50px auto;
            padding: 20px;
            text-align: center;
        }

        h2 {
            font-size: 3rem;
            color: #e63946;
            margin-bottom: 30px;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.1);
        }

        .member-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .member-card {
            background: rgba(255,255,255,0.9);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .member-card a {
            text-decoration: none;
            color: #264653;
            font-size: 1.2rem;
            font-weight: bold;
            display: block;
            cursor: pointer;
        }

        .member-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.2);
        }

        /* Login modal */
        #loginModal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
        }
        #loginBox {
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            width: 300px;
            text-align: center;
        }
        input {
            width: 90%;
            padding: 8px;
            margin: 6px 0;
        }
        button {
            padding: 8px 15px;
            margin-top: 10px;
            background: green;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>সদস্যবৃন্দ</h2>                                 
        <div class="member-grid">
            <div class="member-card"><a onclick="openLogin('Shahin.html')">Nahidul Islam Shahin</a></div>
            <div class="member-card"><a onclick="openLogin('Sowrov.html')">Shohrah Uddin Sowrov</a></div>
            <div class="member-card"><a onclick="openLogin('Sohag.html')">Zahedul Amin Sohag</a></div>
             <div class="member-card"><a href="">Ziabul</a></div>
            <div class="member-card"><a onclick="openLogin('Mojib.html')">Mojibul Alam</a></div>
            <div class="member-card"><a onclick="openLogin('Amor.html')">Jahir Amor</a></div>
            <div class="member-card"><a onclick="openLogin('Naim.html')">Abu Arif Naim</a></div>
            <div class="member-card"><a onclick="openLogin('Tipu.html')">Nahidul Islam Tipu</a></div>
            <div class="member-card"><a onclick="openLogin('Mofiz.html')">Mofiz Alam</a></div>
            <div class="member-card"><a onclick="openLogin('Rumi.html')">Jalal Uddin Rumi</a></div>
            <div class="member-card"><a onclick="openLogin('Shaker.html')">Shaker Alam</a></div>
            <div class="member-card"><a onclick="openLogin('Mahbub.html')">Mahbubul Alam</a></div>
            <div class="member-card"><a onclick="openLogin('Nezam.html')">Nezam Uddin</a></div>
        </div>
    </div>

    <!-- Login Modal -->
    <div id="loginModal">
        <div id="loginBox">
            <h3>Login Required</h3>
            <input type="text" id="username" placeholder="Username"><br>
            <input type="password" id="password" placeholder="Password"><br>
            <button onclick="checkLogin()">Login</button>
            <br><br>
            <button onclick="closeLogin()" style="background:red;">Cancel</button>
        </div>
    </div>

    <script>
        let targetPage = "";

        function openLogin(page) {
            targetPage = page;
            document.getElementById("loginModal").style.display = "flex";
        }

        function closeLogin() {
            document.getElementById("loginModal").style.display = "none";
        }

        function checkLogin() {
            const user = document.getElementById("username").value;
            const pass = document.getElementById("password").value;

            // 🔑 Change these credentials as you like
            const validUser = "atmoshuddi";
            const validPass = "@NSZMJA@";

            if (user === validUser && pass === validPass) {
                window.location.href = targetPage;
            } else {
                alert("❌ Wrong username or password!");
            }
        }
    </script>
</body>
</html>
